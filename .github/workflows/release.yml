name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          semver_pattern='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*)(\.(0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*))*))?(\+([0-9a-zA-Z-]+(\.[0-9a-zA-Z-]+)*))?$'
          if ! [[ "$INPUT_VERSION" =~ $semver_pattern ]]; then
            echo "::error::Invalid SemVer: $INPUT_VERSION"
            exit 1
          fi
          echo "VERSION=$INPUT_VERSION" >> "$GITHUB_ENV"

      - uses: astral-sh/setup-uv@v5

      - name: Set version
        run: uv version "$VERSION"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml uv.lock
          if git diff --staged --quiet; then
            echo "::error::No version changes to commit for ${VERSION}"
            exit 1
          fi
          git commit -m "release v${VERSION}"
          git push origin "HEAD:refs/heads/${{ github.ref_name }}"

      - name: Build packages
        run: uv build

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          assets=(dist/*.whl dist/*.tar.gz)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "::error::No build artifacts found in dist/"
            exit 1
          fi
          gh release create "${VERSION}" \
            --title "${VERSION}" \
            --generate-notes \
            --target "$(git rev-parse HEAD)" \
            "${assets[@]}"
